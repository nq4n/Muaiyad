<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>فيديو الورشة</title><style>body{font-family:Tahoma,Arial,sans-serif;line-height:1.9;background:#f7f2e8;color:#1f2424;margin:0;padding:2rem}main{max-width:820px;margin:auto;background:#fffdf8;padding:2rem;border:1px solid #d8c29a}h1{color:#173331}</style></head><body><main><h1>فيديو الورشة</h1><p>يوثق فيديو الورشة التعريف بموضوع التقويم الإلكتروني، وشرح خطوات استخدام Google Forms، ومشاهد من التطبيق العملي وتحليل نتائج الاستجابات.</p><p>يمكن استخدام هذا النص بوصفه مخططا للتعليق الصوتي أو وصفا للفيديو عند إضافته لاحقا.</p></main></body></html>
