{% extends "base.html" %}
{% set static_render = true %}
{% set hide_default_hero = true %}

{% block hero %}
<style>
  body[data-page="unit-plan"] .unit-plan-hero {
    padding: 0;
  }

  body[data-page="unit-plan"] .unit-plan-hero .section-block-inner {
    padding: clamp(1.8rem, 3vw, 2.6rem);
  }

  body[data-page="unit-plan"] .unit-plan-hero .axes-cli-shell {
    max-width: none;
  }

  body[data-page="unit-plan"] .unit-plan-hero .axes-hero-copy {
    max-width: 72rem;
  }

  body[data-page="unit-plan"] .unit-plan-hero .axes-hero-copy p {
    max-width: none;
  }

  body[data-page="unit-plan"] .unit-plan-hero .axes-hero-nav {
    grid-template-columns: repeat(5, minmax(0, 1fr));
  }

  body[data-page="unit-plan"] .page-content {
    padding: 0;
    background: transparent;
    border: 0;
    box-shadow: none;
  }

  body[data-page="unit-plan"] .unit-plan-shell {
    display: grid;
    gap: 1.15rem;
  }

  body[data-page="unit-plan"] .unit-plan-map,
  body[data-page="unit-plan"] .unit-plan-section {
    border: 1px solid var(--border);
    border-radius: 1.2rem;
    background:
      linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0) 42%),
      var(--panel);
    box-shadow: var(--lift-shadow);
    overflow: hidden;
  }

  body[data-page="unit-plan"] .unit-plan-map .section-block-inner,
  body[data-page="unit-plan"] .unit-plan-section .section-block-inner {
    display: grid;
    gap: 1rem;
    padding: clamp(1.2rem, 2vw, 1.65rem);
    height: 100%;
  }

  body[data-page="unit-plan"] .unit-plan-map-header {
    display: flex;
    flex-wrap: wrap;
    align-items: end;
    justify-content: space-between;
    gap: 0.9rem;
  }

  body[data-page="unit-plan"] .unit-plan-map-header .section-headline {
    display: grid;
    gap: 0.45rem;
  }

  body[data-page="unit-plan"] .unit-plan-map-header h2,
  body[data-page="unit-plan"] .unit-plan-section h2 {
    margin: 0;
    font-size: clamp(1.2rem, 1.6vw, 1.6rem);
    line-height: 1.35;
  }

  body[data-page="unit-plan"] .unit-plan-map-copy {
    margin: 0;
    max-width: 34rem;
    color: var(--muted);
    line-height: 1.85;
  }

  body[data-page="unit-plan"] .unit-plan-map-board {
    display: grid;
    grid-template-columns: minmax(0, 18rem) minmax(0, 1fr);
    gap: 1rem;
    align-items: stretch;
  }

  body[data-page="unit-plan"] .unit-plan-map-core {
    display: grid;
    gap: 0.8rem;
    align-content: start;
    padding: 1.1rem;
    border: 1px solid rgba(214, 177, 109, 0.16);
    border-radius: 1rem;
    background:
      radial-gradient(circle at top, rgba(214, 177, 109, 0.14), transparent 58%),
      linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0)),
      var(--surface-field);
  }

  body[data-page="unit-plan"] .unit-plan-map-kicker {
    margin: 0;
    color: var(--accent);
    font-size: 0.84rem;
    font-weight: 700;
    letter-spacing: 0.03em;
  }

  body[data-page="unit-plan"] .unit-plan-map-core h3 {
    margin: 0;
    font-size: clamp(1.25rem, 1.8vw, 1.7rem);
    line-height: 1.35;
  }

  body[data-page="unit-plan"] .unit-plan-map-core p {
    margin: 0;
    color: var(--muted);
    line-height: 1.8;
  }

  body[data-page="unit-plan"] .unit-plan-map-links {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 0.8rem;
  }

  body[data-page="unit-plan"] .unit-plan-map-link {
    display: grid;
    gap: 0.4rem;
    min-height: 100%;
    padding: 0.95rem 1rem;
    border: 1px solid rgba(214, 177, 109, 0.14);
    border-radius: 1rem;
    text-decoration: none;
    color: var(--text);
    background:
      linear-gradient(135deg, var(--accent-3-soft), var(--accent-2-soft) 58%, rgba(255, 255, 255, 0.03) 100%),
      var(--surface-field);
    transition: transform 0.22s ease, border-color 0.22s ease, box-shadow 0.22s ease;
  }

  body[data-page="unit-plan"] .unit-plan-map-link:hover,
  body[data-page="unit-plan"] .unit-plan-map-link:focus-visible {
    transform: translateY(-2px);
    border-color: var(--accent);
    box-shadow: 0 12px 24px rgba(0, 0, 0, 0.16);
  }

  body[data-page="unit-plan"] .unit-plan-map-link-index {
    color: var(--accent);
    font-size: 0.82rem;
    font-weight: 700;
  }

  body[data-page="unit-plan"] .unit-plan-map-link-label {
    line-height: 1.65;
  }

  body[data-page="unit-plan"] .unit-plan-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 1rem;
  }

  body[data-page="unit-plan"] .unit-plan-section .section-copy {
    display: grid;
    gap: 0.7rem;
  }

  body[data-page="unit-plan"] .unit-plan-section .section-copy p {
    margin: 0;
    padding: 0.85rem 0.95rem;
    border: 1px solid rgba(214, 177, 109, 0.14);
    border-radius: 0.95rem;
    background:
      linear-gradient(135deg, var(--accent-3-soft), var(--accent-2-soft) 58%, rgba(255, 255, 255, 0.03) 100%),
      var(--surface-field);
    line-height: 1.9;
  }

  html[data-theme="light"] body[data-page="unit-plan"] .unit-plan-hero,
  html[data-theme="light"] body[data-page="unit-plan"] .unit-plan-map,
  html[data-theme="light"] body[data-page="unit-plan"] .unit-plan-section {
    border-color: rgba(184, 139, 74, 0.18);
    box-shadow: 0 12px 28px rgba(145, 120, 87, 0.08), 0 0 0 1px rgba(184, 139, 74, 0.04) inset;
  }

  html[data-theme="light"] body[data-page="unit-plan"] .unit-plan-hero,
  html[data-theme="light"] body[data-page="unit-plan"] .unit-plan-map,
  html[data-theme="light"] body[data-page="unit-plan"] .unit-plan-section {
    background:
      linear-gradient(180deg, rgba(255, 250, 245, 0.34), rgba(255, 255, 255, 0) 44%),
      var(--panel);
  }

  html[data-theme="light"] body[data-page="unit-plan"] .unit-plan-map-core,
  html[data-theme="light"] body[data-page="unit-plan"] .unit-plan-map-link,
  html[data-theme="light"] body[data-page="unit-plan"] .unit-plan-section .section-copy p {
    border-color: rgba(184, 139, 74, 0.16);
    background:
      linear-gradient(135deg, rgba(145, 83, 117, 0.06), rgba(90, 143, 142, 0.06) 58%, rgba(255, 255, 255, 0.3) 100%),
      var(--surface-field);
  }

  @media (max-width: 980px) {
    body[data-page="unit-plan"] .unit-plan-hero .axes-hero-nav {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    body[data-page="unit-plan"] .unit-plan-map-board,
    body[data-page="unit-plan"] .unit-plan-grid,
    body[data-page="unit-plan"] .unit-plan-map-links {
      grid-template-columns: 1fr;
    }
  }

  @media (max-width: 640px) {
    body[data-page="unit-plan"] .unit-plan-hero .axes-hero-nav {
      grid-template-columns: 1fr;
    }
  }
</style>

<section class="section-card axes-hero unit-plan-hero" aria-labelledby="unit-plan-hero-title">
  <div class="section-block-inner axes-hero-inner">
    <div class="axes-cli-shell">
      <div class="axes-cli-topline">
        <p class="terminal-path axes-hero-path">~/portfolio/{{ page_id }}</p>
        <p class="axes-cli-note" id="unit-plan-hero-note"></p>
      </div>
      <div class="section-headline">
        <h1 id="unit-plan-hero-title" data-unit-plan-copy="hero.title"></h1>
      </div>
      <div class="section-copy axes-hero-copy" id="unit-plan-hero-copy"></div>
      <div class="axes-hero-access">
        <p class="axes-access-kicker" id="unit-plan-hero-nav-label"></p>
        <p class="axes-access-hint" id="unit-plan-hero-nav-hint"></p>
        <nav class="axes-hero-nav" id="unit-plan-hero-nav" aria-label="Unit pages access"></nav>
      </div>
      <p class="typewriter-line axes-hero-prompt"><span id="unit-plan-hero-prompt"></span><span class="cursor" aria-hidden="true"></span></p>
    </div>
  </div>
</section>
{% endblock %}

{% block page_content %}
<div class="unit-plan-shell">
  <section class="section-card unit-plan-map reveal" data-reveal="fade-up" aria-labelledby="unit-plan-map-title">
    <div class="section-block-inner">
      <div class="unit-plan-map-header">
        <div class="section-headline">
          <h2 id="unit-plan-map-title"></h2>
        </div>
        <p class="unit-plan-map-copy" id="unit-plan-map-copy"></p>
      </div>

      <div class="unit-plan-map-board">
        <article class="unit-plan-map-core">
          <p class="unit-plan-map-kicker" id="unit-plan-map-kicker"></p>
          <h3 id="unit-plan-map-core-title"></h3>
          <p id="unit-plan-map-core-copy"></p>
        </article>
        <nav class="unit-plan-map-links" id="unit-plan-map-links"></nav>
      </div>
    </div>
  </section>

  <div class="unit-plan-grid">
    <section class="section-card unit-plan-section reveal" data-reveal="fade-up" aria-labelledby="unit-plan-overview-title">
      <div class="section-block-inner">
        <div class="section-headline">
          <h2 id="unit-plan-overview-title" data-unit-plan-copy="overview.title"></h2>
        </div>
        <div class="section-copy" data-unit-plan-paragraphs="overview.body"></div>
      </div>
    </section>

    <section class="section-card unit-plan-section reveal" data-reveal="fade-up" aria-labelledby="unit-plan-implementation-title">
      <div class="section-block-inner">
        <div class="section-headline">
          <h2 id="unit-plan-implementation-title" data-unit-plan-copy="implementation.title"></h2>
        </div>
        <div class="section-copy" data-unit-plan-paragraphs="implementation.body"></div>
      </div>
    </section>

    <section class="section-card unit-plan-section reveal" data-reveal="fade-up" aria-labelledby="unit-plan-next-title">
      <div class="section-block-inner">
        <div class="section-headline">
          <h2 id="unit-plan-next-title" data-unit-plan-copy="next_action.title"></h2>
        </div>
        <div class="section-copy" data-unit-plan-paragraphs="next_action.body"></div>
      </div>
    </section>
  </div>
</div>

<script>
  (() => {
    const unitPlanMapCopy = {
      en: {
        heroNote: "portfolio/unit-plan/~",
        heroNavLabel: "Unified Access",
        heroNavHint: "Use these links to move directly to any unit section.",
        title: "Unit Mind Map",
        description: "Use this page as the entry point to the full unit. Each card below opens one section so the unit can be reviewed in a clear sequence.",
        kicker: "Map",
        coreTitle: "Unit Structure",
        coreCopy: "Start with the introduction, then move through framework, objectives, assessment, lessons, feedback, impact, reflection, references, and appendices."
      },
      ar: {
        heroNote: "portfolio/unit-plan/~",
        heroNavLabel: "الوصول الموحد",
        heroNavHint: "استخدم هذه الروابط للانتقال مباشرة إلى أي قسم من أقسام الوحدة.",
        title: "الخريطة الذهنية للوحدة",
        description: "تعمل هذه الصفحة كبوابة مختصرة للوحدة كاملة. افتح كل بطاقة بالترتيب للوصول إلى أقسام الوحدة بصورة واضحة ومنظمة.",
        kicker: "الخريطة",
        coreTitle: "بنية الوحدة",
        coreCopy: "ابدأ بمقدمة الوحدة، ثم انتقل إلى الإطار النظري والأهداف والتقويم والدروس والتغذية الراجعة وقياس الأثر والتأمل والمراجع والملاحق."
      }
    };

    function readPath(source, path) {
      return path.split(".").reduce((value, key) => (value && Object.prototype.hasOwnProperty.call(value, key) ? value[key] : ""), source);
    }

    function toParagraphs(value) {
      const list = Array.isArray(value) ? value : [value];
      return list.filter(Boolean).map((item) => `<p>${String(item)}</p>`).join("");
    }

    function renderUnitPlanPage() {
      const APP = window.PORTFOLIO_APP;
      const dataSet = window.PORTFOLIO_PAGE_DATA?.["unit-plan"];
      if (!APP || !dataSet) return;

      const lang = APP.state?.lang === "en" ? "en" : "ar";
      const page = dataSet[lang] || dataSet.ar || dataSet.en || {};
      const mapCopy = unitPlanMapCopy[lang];

      document.querySelectorAll("[data-unit-plan-copy]").forEach((node) => {
        const value = readPath(page, node.dataset.unitPlanCopy);
        node.textContent = value || "";
      });

      document.querySelectorAll("[data-unit-plan-paragraphs]").forEach((node) => {
        const value = readPath(page, node.dataset.unitPlanParagraphs);
        node.innerHTML = toParagraphs(value);
      });

      const heroCopy = document.getElementById("unit-plan-hero-copy");
      const heroNote = document.getElementById("unit-plan-hero-note");
      const heroNavLabel = document.getElementById("unit-plan-hero-nav-label");
      const heroNavHint = document.getElementById("unit-plan-hero-nav-hint");
      const heroNav = document.getElementById("unit-plan-hero-nav");
      const heroPrompt = document.getElementById("unit-plan-hero-prompt");

      const title = document.getElementById("unit-plan-map-title");
      const description = document.getElementById("unit-plan-map-copy");
      const kicker = document.getElementById("unit-plan-map-kicker");
      const coreTitle = document.getElementById("unit-plan-map-core-title");
      const coreCopy = document.getElementById("unit-plan-map-core-copy");
      const links = document.getElementById("unit-plan-map-links");

      if (title) title.textContent = mapCopy.title;
      if (description) description.textContent = mapCopy.description;
      if (kicker) kicker.textContent = mapCopy.kicker;
      if (coreTitle) coreTitle.textContent = mapCopy.coreTitle;
      if (coreCopy) coreCopy.textContent = mapCopy.coreCopy;
      if (heroCopy) heroCopy.innerHTML = toParagraphs(page.hero?.subtitle || "");
      if (heroNote) heroNote.textContent = mapCopy.heroNote;
      if (heroNavLabel) heroNavLabel.textContent = mapCopy.heroNavLabel;
      if (heroNavHint) heroNavHint.textContent = mapCopy.heroNavHint;
      if (heroPrompt) heroPrompt.textContent = page.hero?.prompt || "";

      if (links || heroNav) {
        const unitEntry = APP.getNavStructure?.().find((item) => item.id === "unit-plan");
        const pages = Array.isArray(unitEntry?.children) ? unitEntry.children : [];
        const heroNavMarkup = pages.map((id, index) => `
          <a class="axes-nav-chip" href="${APP.hrefFor(id)}">
            <span class="axes-nav-index">${String(index + 1).padStart(2, "0")}</span>
            <span>${APP.U.esc(APP.navLabel(id, lang))}</span>
          </a>
        `).join("");
        const mapMarkup = pages.map((id, index) => `
          <a class="unit-plan-map-link" href="${APP.hrefFor(id)}">
            <span class="unit-plan-map-link-index">${String(index + 1).padStart(2, "0")}</span>
            <strong class="unit-plan-map-link-label">${APP.U.esc(APP.navLabel(id, lang))}</strong>
          </a>
        `).join("");
        if (heroNav) {
          heroNav.setAttribute("aria-label", mapCopy.heroNavLabel);
          heroNav.innerHTML = heroNavMarkup;
        }
        if (links) {
          links.setAttribute("aria-label", mapCopy.title);
          links.innerHTML = mapMarkup;
        }
      }
    }

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", renderUnitPlanPage, { once: true });
    } else {
      renderUnitPlanPage();
    }
  })();
</script>
{% endblock %}
