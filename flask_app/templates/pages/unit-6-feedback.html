{% extends "base.html" %}

{% block hero %}
<style>
  body[data-page="unit-6-feedback"] .hero-card {
    border-color: var(--accent);
    background:
      radial-gradient(circle at 82% 18%, rgba(214, 177, 109, 0.12), transparent 24%),
      radial-gradient(circle at 18% 82%, rgba(90, 143, 142, 0.1), transparent 20%),
      var(--panel);
  }

  body[data-page="unit-6-feedback"] .page-content {
    padding: 0;
    background: transparent;
    border: 0;
    box-shadow: none;
  }

  body[data-page="unit-6-feedback"] #page-sections {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    align-items: start;
    gap: 1rem;
  }

  body[data-page="unit-6-feedback"] #page-sections .section-block {
    width: auto;
    max-width: none;
    min-width: 0;
    margin: 0 !important;
    padding: 1.45rem;
    border: 1px solid var(--border);
    border-radius: 1.2rem;
    background:
      linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0) 42%),
      var(--panel);
    box-shadow: var(--lift-shadow);
    transform: translateY(16px);
    align-self: start;
    height: auto;
  }

  body[data-page="unit-6-feedback"] #page-sections .section-block .section-block-inner {
    height: auto;
  }

  body[data-page="unit-6-feedback"] #page-sections .section-block:nth-child(odd),
  body[data-page="unit-6-feedback"] #page-sections .section-block:nth-child(even) {
    transform: translateY(16px);
  }

  body[data-page="unit-6-feedback"] #page-sections .section-block.is-visible {
    transform: none;
  }

  body[data-page="unit-6-feedback"] #page-sections .section-block:first-child,
  body[data-page="unit-6-feedback"] #page-sections .section-block:last-child {
    grid-column: 1 / -1;
  }

  body[data-page="unit-6-feedback"] #page-sections .section-block:nth-child(2) {
    grid-column: 1 / -1;
    background:
      linear-gradient(90deg, rgba(214, 177, 109, 0.08), rgba(255, 255, 255, 0) 65%),
      var(--panel);
  }

  body[data-page="unit-6-feedback"] .unit-layout-board {
    margin-top: 1rem;
    padding: 1.2rem;
  }

  body[data-page="unit-6-feedback"] .unit-layout-grid {
    display: grid;
    grid-template-columns: minmax(0, 0.92fr) minmax(0, 1.28fr);
    gap: 1rem;
    align-items: start;
  }

  body[data-page="unit-6-feedback"] .unit-layout-cards {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 0.75rem;
  }

  body[data-page="unit-6-feedback"] .unit-layout-card {
    display: grid;
    gap: 0.35rem;
    min-height: 6.5rem;
    padding: 1rem;
    border: 1px solid var(--border);
    border-radius: 1rem;
    background:
      linear-gradient(135deg, var(--accent-3-soft), var(--accent-2-soft) 58%, rgba(255, 255, 255, 0.03) 100%),
      var(--surface-field);
  }

  body[data-page="unit-6-feedback"] .unit-layout-card-label {
    color: var(--muted);
    font-size: 0.78rem;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  body[data-page="unit-6-feedback"] .unit-layout-card-value {
    color: var(--text);
    font-size: clamp(1.05rem, 1.3vw, 1.35rem);
    line-height: 1.3;
  }

  body[data-page="unit-6-feedback"] .unit-layout-table-shell {
    display: grid;
    gap: 0.8rem;
  }

  body[data-page="unit-6-feedback"] .unit-layout-table-shell .section-headline h2 {
    margin-bottom: 0;
    font-size: clamp(1.1rem, 1.6vw, 1.45rem);
  }

  body[data-page="unit-6-feedback"] .unit-layout-table th,
  body[data-page="unit-6-feedback"] .unit-layout-table td {
    padding: 0.85rem 0.95rem;
  }

  body[data-page="unit-6-feedback"] .unit-layout-table tbody th {
    width: 42%;
  }

  body[data-page="unit-6-feedback"] #page-sections .section-copy {
    display: grid;
    gap: 0.7rem;
  }

  body[data-page="unit-6-feedback"] #page-sections .section-copy p {
    margin: 0;
    padding: 0.88rem 1rem;
    border: 1px solid rgba(214, 177, 109, 0.14);
    border-radius: 0.95rem;
    background:
      linear-gradient(135deg, var(--accent-3-soft), var(--accent-2-soft) 58%, rgba(255, 255, 255, 0.03) 100%),
      var(--surface-field);
  }

  html[data-theme="light"] body[data-page="unit-6-feedback"] .hero-card,
  html[data-theme="light"] body[data-page="unit-6-feedback"] #page-sections .section-block,
  html[data-theme="light"] body[data-page="unit-6-feedback"] .unit-layout-board {
    border-color: rgba(184, 139, 74, 0.18);
    box-shadow: 0 12px 28px rgba(145, 120, 87, 0.08), 0 0 0 1px rgba(184, 139, 74, 0.04) inset;
  }

  html[data-theme="light"] body[data-page="unit-6-feedback"] .hero-card {
    background:
      radial-gradient(circle at 14% 16%, rgba(145, 83, 117, 0.07), transparent 20%),
      radial-gradient(circle at 86% 82%, rgba(90, 143, 142, 0.07), transparent 20%),
      linear-gradient(180deg, rgba(255, 248, 241, 0.28), rgba(255, 255, 255, 0) 42%),
      var(--panel);
  }

  html[data-theme="light"] body[data-page="unit-6-feedback"] .unit-layout-board,
  html[data-theme="light"] body[data-page="unit-6-feedback"] #page-sections .section-block {
    background:
      linear-gradient(180deg, rgba(255, 250, 245, 0.32), rgba(255, 255, 255, 0) 44%),
      var(--panel);
  }

  html[data-theme="light"] body[data-page="unit-6-feedback"] #page-sections .section-block:nth-child(2) {
    background:
      linear-gradient(90deg, rgba(184, 139, 74, 0.08), rgba(255, 255, 255, 0) 70%),
      linear-gradient(180deg, rgba(255, 250, 245, 0.32), rgba(255, 255, 255, 0) 44%),
      var(--panel);
  }

  html[data-theme="light"] body[data-page="unit-6-feedback"] .unit-layout-card,
  html[data-theme="light"] body[data-page="unit-6-feedback"] #page-sections .section-copy p {
    border-color: rgba(184, 139, 74, 0.16);
    background:
      linear-gradient(135deg, rgba(145, 83, 117, 0.06), rgba(90, 143, 142, 0.06) 58%, rgba(255, 255, 255, 0.3) 100%),
      var(--surface-field);
    box-shadow: 0 8px 18px rgba(145, 120, 87, 0.05);
  }

  html[data-theme="light"] body[data-page="unit-6-feedback"] .unit-layout-card-label {
    color: rgba(96, 77, 58, 0.78);
  }

  html[data-theme="light"] body[data-page="unit-6-feedback"] .unit-layout-table {
    background: rgba(252, 248, 242, 0.75);
    border-color: rgba(184, 139, 74, 0.16);
  }

  html[data-theme="light"] body[data-page="unit-6-feedback"] .unit-layout-table th,
  html[data-theme="light"] body[data-page="unit-6-feedback"] .unit-layout-table td {
    border-color: rgba(184, 139, 74, 0.14);
  }

  html[data-theme="light"] body[data-page="unit-6-feedback"] .unit-layout-table thead th {
    background: rgba(255, 248, 241, 0.32);
    color: var(--text);
  }

  @media (max-width: 1180px) {
    body[data-page="unit-6-feedback"] #page-sections {
      grid-template-columns: 1fr;
    }
  }

  @media (max-width: 920px) {
    body[data-page="unit-6-feedback"] .unit-layout-grid,
    body[data-page="unit-6-feedback"] .unit-layout-cards {
      grid-template-columns: 1fr;
    }

    body[data-page="unit-6-feedback"] #page-sections .section-block {
      width: 100%;
      max-width: none;
    }
  }
</style>
{{ super() }}
<section class="section-card unit-layout-board" aria-labelledby="unit-feedback-board-title">
  <div class="section-block-inner unit-sections-map" data-unit-sections-map>
    <div class="section-headline">
      <h2 id="unit-feedback-board-title">{{ "الخريطة الذهنية للأقسام" if lang == "ar" else "Section Mind Map" }}</h2>
    </div>
    <ul class="unit-sections-map-list" data-unit-map-list></ul>
  </div>
</section>
{% endblock %}
