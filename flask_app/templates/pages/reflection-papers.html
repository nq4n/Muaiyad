{% extends "base.html" %}
{% set static_render = true %}
{% set page_prompt = "$ open reflection-papers" %}

{% block page_content %}
<div class="content-container">
    <section class="intro-section">
        <div class="terminal-card intro-card reveal" data-reveal="fade-up">
            <h2 id="reflection-papers-intro-title"></h2>
            <div class="intro-text" id="reflection-papers-intro-copy"></div>
        </div>
    </section>

    <section class="papers-section">
        <div class="papers-grid" id="reflection-papers-grid"></div>
    </section>
</div>

<style>
    .content-container { padding: 0; max-width: none; margin: 0; }
    .intro-section { margin-bottom: 3rem; }
    .intro-card { background: rgba(214, 177, 109, 0.06); border: 1px solid rgba(214, 177, 109, 0.22); padding: 2rem; border-radius: 1rem; }
    .intro-card h2 { color: var(--accent); text-align: center; margin-bottom: 1.5rem; }
    .intro-text { text-align: justify; line-height: 1.85; color: var(--muted); }
    .papers-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.5rem; }
    .paper-card { display: flex; }
    .paper-link-card { width: 100%; padding: 1.65rem; display: flex; flex-direction: column; align-items: center; text-align: center; gap: 0.75rem; }
    .paper-number { width: 3.25rem; height: 3.25rem; border-radius: 999px; background: linear-gradient(180deg, rgba(214, 177, 109, 0.22), rgba(214, 177, 109, 0.08)); color: var(--accent); display: flex; align-items: center; justify-content: center; font-weight: 700; margin-bottom: 0.25rem; border: 1px solid rgba(214, 177, 109, 0.26); }
    .paper-link-card h4 { margin: 0; }
    .paper-description { color: var(--muted); font-size: 0.95rem; margin: 0 0 0.35rem; }
    .paper-button { display: inline-flex; align-items: center; gap: 0.7rem; padding: 0.7rem 1rem; border-radius: 999px; border: 1px solid rgba(214, 177, 109, 0.26); background: rgba(18, 27, 30, 0.74); color: var(--text); text-decoration: none; font-weight: 700; transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease; }
    .paper-button-badge { width: 1.9rem; height: 1.9rem; border-radius: 999px; display: inline-flex; align-items: center; justify-content: center; background: rgba(255, 255, 255, 0.08); box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.03) inset; }
    .paper-button--drive .paper-button-badge { background: rgba(255, 255, 255, 0.1); }
    .paper-button--internal .paper-button-badge { color: var(--accent); }
    .paper-platform-icon { width: 1rem; height: 1rem; display: block; }
    .paper-button:hover,
    .paper-button:focus-visible { transform: translateY(-1px); border-color: var(--accent); box-shadow: 0 12px 22px rgba(0, 0, 0, 0.18); background: rgba(20, 31, 34, 0.92); }
    .paper-button--drive:hover,
    .paper-button--drive:focus-visible { box-shadow: 0 12px 22px rgba(66, 133, 244, 0.12); }

    @media (max-width: 700px) {
        .intro-card { padding: 1.5rem; }
        .paper-link-card { padding: 1.35rem; }
        .paper-button { width: 100%; justify-content: center; }
    }
</style>
{% endblock %}
