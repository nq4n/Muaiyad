{% extends "base.html" %}
{% set static_render = true %}
{% set hide_default_hero = true %}

{% block hero %}
<section class="section-card axes-hero" aria-labelledby="axes-page-title">
  <div class="section-block-inner axes-hero-inner">
    <div class="axes-cli-shell">
      <div class="axes-cli-topline">
        <p class="terminal-path axes-hero-path">~/portfolio/{{ page_id }}</p>
        <p class="axes-cli-note" id="axes-page-note"></p>
      </div>
      <div class="section-headline">
        <h1 id="axes-page-title"></h1>
      </div>
      <div class="section-copy axes-hero-copy" id="axes-page-copy"></div>
      <div class="axes-hero-access">
        <p class="axes-access-kicker" id="axes-page-nav-label"></p>
        <p class="axes-access-hint" id="axes-page-nav-hint"></p>
        <nav class="axes-hero-nav" id="axes-page-nav" aria-label="Conceptual axes unified access"></nav>
      </div>
      <p class="typewriter-line axes-hero-prompt"><span id="axes-page-prompt"></span><span class="cursor" aria-hidden="true"></span></p>
    </div>
  </div>
</section>
{% endblock %}

{% block page_content %}
<div class="axes-page-stack" id="conceptual-axes-shell"></div>
{% endblock %}
