{% extends "base.html" %}
{% set static_render = true %}
{% set hide_default_hero = true %}

{% block hero %}
<style>
  body[data-page="unit-1-intro"] .page-hero {
    border-color: var(--accent);
    background:
      radial-gradient(circle at 16% 18%, rgba(214, 177, 109, 0.12), transparent 24%),
      radial-gradient(circle at 84% 80%, rgba(90, 143, 142, 0.1), transparent 20%),
      linear-gradient(135deg, rgba(255, 255, 255, 0.07), rgba(255, 255, 255, 0) 42%),
      var(--panel);
  }

  body[data-page="unit-1-intro"] .page-content {
    padding: 0;
    background: transparent;
    border: 0;
    box-shadow: none;
  }

  body[data-page="unit-1-intro"] .structured-page {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    align-items: stretch;
    gap: 1rem;
  }

  body[data-page="unit-1-intro"] .structured-page > .page-section {
    flex: 1 1 22rem;
    width: min(100%, 23rem);
    max-width: 23rem;
  }

  body[data-page="unit-1-intro"] .structured-page > .page-section:first-child,
  body[data-page="unit-1-intro"] .structured-page > .page-section:nth-child(3) {
    flex-basis: min(100%, 78rem);
    width: min(100%, 78rem);
    max-width: 78rem;
  }

  body[data-page="unit-1-intro"] .structured-page > .page-section:nth-child(2) {
    flex-basis: 34rem;
    width: min(100%, 38rem);
    max-width: 38rem;
  }

  body[data-page="unit-1-intro"] .structured-page > .page-section {
    overflow: hidden;
  }

  body[data-page="unit-1-intro"] .structured-page > .page-section .section-block-inner {
    height: 100%;
  }

  body[data-page="unit-1-intro"] #unit-general-data-table,
  body[data-page="unit-1-intro"] #unit-lesson-dist-table {
    border-color: rgba(214, 177, 109, 0.18);
  }

  body[data-page="unit-1-intro"] #unit-lesson-dist-table thead th {
    background: rgba(255, 255, 255, 0.04);
    color: var(--text);
  }

  body[data-page="unit-1-intro"] .page-section .section-copy {
    display: grid;
    gap: 0.7rem;
  }

  body[data-page="unit-1-intro"] .page-section .section-copy p {
    margin: 0;
    padding: 0.9rem 1rem;
    border: 1px solid rgba(214, 177, 109, 0.14);
    border-radius: 0.95rem;
    background:
      linear-gradient(135deg, var(--accent-3-soft), var(--accent-2-soft) 58%, rgba(255, 255, 255, 0.03) 100%),
      var(--surface-field);
  }

  body[data-page="unit-1-intro"] .home-training-table th,
  body[data-page="unit-1-intro"] .home-training-table td {
    padding: 0.85rem 0.95rem;
  }

  html[data-theme="light"] body[data-page="unit-1-intro"] .page-hero,
  html[data-theme="light"] body[data-page="unit-1-intro"] .structured-page > .page-section {
    border-color: rgba(184, 139, 74, 0.18);
    box-shadow: 0 12px 28px rgba(145, 120, 87, 0.08), 0 0 0 1px rgba(184, 139, 74, 0.04) inset;
  }

  html[data-theme="light"] body[data-page="unit-1-intro"] .page-hero {
    background:
      radial-gradient(circle at 14% 16%, rgba(145, 83, 117, 0.07), transparent 18%),
      radial-gradient(circle at 86% 80%, rgba(90, 143, 142, 0.07), transparent 18%),
      linear-gradient(180deg, rgba(255, 248, 241, 0.28), rgba(255, 255, 255, 0) 42%),
      var(--panel);
  }

  html[data-theme="light"] body[data-page="unit-1-intro"] .structured-page > .page-section {
    background:
      linear-gradient(180deg, rgba(255, 250, 245, 0.32), rgba(255, 255, 255, 0) 44%),
      var(--panel);
  }

  html[data-theme="light"] body[data-page="unit-1-intro"] .page-section .section-copy p {
    border-color: rgba(184, 139, 74, 0.16);
    background:
      linear-gradient(135deg, rgba(145, 83, 117, 0.06), rgba(90, 143, 142, 0.06) 58%, rgba(255, 255, 255, 0.3) 100%),
      var(--surface-field);
    box-shadow: 0 8px 18px rgba(145, 120, 87, 0.05);
  }

  html[data-theme="light"] body[data-page="unit-1-intro"] #unit-general-data-table,
  html[data-theme="light"] body[data-page="unit-1-intro"] #unit-lesson-dist-table {
    border-color: rgba(184, 139, 74, 0.18);
    background: rgba(252, 248, 242, 0.78);
  }

  html[data-theme="light"] body[data-page="unit-1-intro"] #unit-general-data-table th,
  html[data-theme="light"] body[data-page="unit-1-intro"] #unit-general-data-table td,
  html[data-theme="light"] body[data-page="unit-1-intro"] #unit-lesson-dist-table th,
  html[data-theme="light"] body[data-page="unit-1-intro"] #unit-lesson-dist-table td {
    border-color: rgba(184, 139, 74, 0.14);
  }

  html[data-theme="light"] body[data-page="unit-1-intro"] #unit-lesson-dist-table thead th {
    background: rgba(255, 248, 241, 0.32);
    color: var(--text);
  }

  @media (max-width: 960px) {
    body[data-page="unit-1-intro"] .structured-page > .page-section {
      width: 100%;
      max-width: none;
    }
  }
</style>
<section class="section-card page-panel page-hero reveal" data-reveal="fade-up" aria-labelledby="unit-intro-title">
  <div class="section-block-inner page-hero-inner">
    <p class="terminal-path page-kicker">~/portfolio/{{ page_id }}</p>
    <div class="section-headline">
      <h1 id="unit-intro-title" data-page-copy="hero.title"></h1>
    </div>
    <div class="section-copy page-hero-copy" data-page-paragraphs="hero.subtitle"></div>
    <p class="typewriter-line page-hero-prompt"><span data-page-copy="hero.prompt"></span><span class="cursor" aria-hidden="true"></span></p>
  </div>
</section>
{% endblock %}

{% block page_content %}
<div class="structured-page">
  <!-- Overview Section -->
  <section class="section-card page-panel page-section reveal" data-reveal="fade-up" aria-labelledby="unit-overview-title">
    <div class="section-block-inner">
      <header class="page-section-header">
        <h2 id="unit-overview-title" class="page-section-title" data-page-copy="overview.title"></h2>
      </header>
      <div class="section-copy" data-page-paragraphs="overview.body"></div>
    </div>
  </section>

  <!-- General Unit Data Section -->
  <section class="section-card page-panel page-section reveal" data-reveal="fade-up" aria-labelledby="unit-general-data-title">
    <div class="section-block-inner">
      <header class="page-section-header">
        <h2 id="unit-general-data-title" class="page-section-title" data-page-copy="general_data.title"></h2>
      </header>
      <table class="home-training-table" id="unit-general-data-table">
        <tbody id="unit-general-data-rows"></tbody>
      </table>
    </div>
  </section>

  <!-- Lesson Distribution Section -->
  <section class="section-card page-panel page-section reveal" data-reveal="fade-up" aria-labelledby="unit-lesson-dist-title">
    <div class="section-block-inner">
      <header class="page-section-header">
        <h2 id="unit-lesson-dist-title" class="page-section-title" data-page-copy="lesson_distribution.title"></h2>
      </header>
      <table class="home-training-table" id="unit-lesson-dist-table">
        <thead>
          <tr>
            <th scope="col" style="width: 5%">م</th>
            <th scope="col" style="width: 20%">الدروس / Lessons</th>
            <th scope="col" style="width: 65%">المواضيع / Topics</th>
            <th scope="col" style="width: 10%">الحصص / Sessions</th>
          </tr>
        </thead>
        <tbody id="unit-lesson-dist-rows"></tbody>
      </table>
    </div>
  </section>

  <!-- Interdisciplinary Links Section -->
  <section class="section-card page-panel page-section reveal" data-reveal="fade-up" aria-labelledby="unit-interdisciplinary-title">
    <div class="section-block-inner">
      <header class="page-section-header">
        <h2 id="unit-interdisciplinary-title" class="page-section-title" data-page-copy="interdisciplinary_links.title"></h2>
      </header>
      <div class="section-copy" data-page-paragraphs="interdisciplinary_links.body"></div>
    </div>
  </section>

  <!-- Educational Context Section -->
  <section class="section-card page-panel page-section reveal" data-reveal="fade-up" aria-labelledby="unit-context-title">
    <div class="section-block-inner">
      <header class="page-section-header">
        <h2 id="unit-context-title" class="page-section-title" data-page-copy="learning_context.title"></h2>
      </header>
      <div class="section-copy" data-page-paragraphs="learning_context.body"></div>
    </div>
  </section>

  <!-- Rationale, Benefits, and Challenges Section -->
  <section class="section-card page-panel page-section reveal" data-reveal="fade-up" aria-labelledby="unit-rationale-title">
    <div class="section-block-inner">
      <header class="page-section-header">
        <h2 id="unit-rationale-title" class="page-section-title" data-page-copy="rationale.title"></h2>
      </header>
      <div class="section-copy" data-page-paragraphs="rationale.body"></div>
    </div>
  </section>
</div>
{% endblock %}
