{% extends "base.html" %}

{% block hero %}
<style>
  body[data-page="unit-5-lessons"] .hero-card {
    border-color: var(--accent);
    background:
      radial-gradient(circle at 16% 18%, rgba(214, 177, 109, 0.12), transparent 24%),
      linear-gradient(135deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0) 38%),
      var(--panel);
  }

  body[data-page="unit-5-lessons"] .page-content {
    padding: 0;
    background: transparent;
    border: 0;
    box-shadow: none;
  }

  body[data-page="unit-5-lessons"] #page-sections {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    align-items: stretch;
    gap: 1rem;
    counter-reset: lesson-step;
  }

  body[data-page="unit-5-lessons"] #page-sections .section-block {
    flex: 1 1 28rem;
    width: min(100%, 36rem);
    max-width: 36rem;
    position: relative;
    margin: 0 !important;
    padding: 1.5rem;
    border: 1px solid var(--border);
    border-radius: 1.2rem;
    background:
      linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0) 42%),
      var(--panel);
    box-shadow: var(--lift-shadow);
    transform: translateY(16px);
  }

  body[data-page="unit-5-lessons"] #page-sections .section-block:nth-child(odd),
  body[data-page="unit-5-lessons"] #page-sections .section-block:nth-child(even) {
    transform: translateY(16px);
  }

  body[data-page="unit-5-lessons"] #page-sections .section-block.is-visible {
    transform: none;
  }

  body[data-page="unit-5-lessons"] #page-sections .section-block:first-child,
  body[data-page="unit-5-lessons"] #page-sections .section-block:last-child {
    flex-basis: min(100%, 78rem);
    width: min(100%, 78rem);
    max-width: 78rem;
  }

  body[data-page="unit-5-lessons"] #page-sections .section-block:nth-child(n+2):nth-child(-n+6)::before {
    counter-increment: lesson-step;
    content: counter(lesson-step, decimal-leading-zero);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 2.3rem;
    height: 2.3rem;
    margin-bottom: 0.9rem;
    border-radius: 0.8rem;
    border: 1px solid var(--border);
    background: var(--surface-field);
    color: var(--accent);
    font-weight: 700;
  }

  body[data-page="unit-5-lessons"] .unit-layout-board {
    margin-top: 1rem;
    padding: 1.2rem;
  }

  body[data-page="unit-5-lessons"] .unit-layout-grid {
    display: grid;
    grid-template-columns: minmax(0, 0.92fr) minmax(0, 1.28fr);
    gap: 1rem;
    align-items: start;
  }

  body[data-page="unit-5-lessons"] .unit-layout-cards {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 0.75rem;
  }

  body[data-page="unit-5-lessons"] .unit-layout-card {
    display: grid;
    gap: 0.35rem;
    min-height: 6.5rem;
    padding: 1rem;
    border: 1px solid var(--border);
    border-radius: 1rem;
    background:
      linear-gradient(135deg, var(--accent-3-soft), var(--accent-2-soft) 58%, rgba(255, 255, 255, 0.03) 100%),
      var(--surface-field);
  }

  body[data-page="unit-5-lessons"] .unit-layout-card-label {
    color: var(--muted);
    font-size: 0.78rem;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  body[data-page="unit-5-lessons"] .unit-layout-card-value {
    color: var(--text);
    font-size: clamp(1.05rem, 1.3vw, 1.35rem);
    line-height: 1.3;
  }

  body[data-page="unit-5-lessons"] .unit-layout-table-shell {
    display: grid;
    gap: 0.8rem;
  }

  body[data-page="unit-5-lessons"] .unit-layout-table-shell .section-headline h2 {
    margin-bottom: 0;
    font-size: clamp(1.1rem, 1.6vw, 1.45rem);
  }

  body[data-page="unit-5-lessons"] .unit-layout-table th,
  body[data-page="unit-5-lessons"] .unit-layout-table td {
    padding: 0.85rem 0.95rem;
  }

  body[data-page="unit-5-lessons"] .unit-layout-table tbody th {
    width: 42%;
  }

  body[data-page="unit-5-lessons"] #page-sections .section-copy {
    display: grid;
    gap: 0.7rem;
  }

  body[data-page="unit-5-lessons"] #page-sections .section-copy p {
    margin: 0;
    padding: 0.88rem 1rem;
    border: 1px solid rgba(214, 177, 109, 0.14);
    border-radius: 0.95rem;
    background:
      linear-gradient(135deg, var(--accent-3-soft), var(--accent-2-soft) 58%, rgba(255, 255, 255, 0.03) 100%),
      var(--surface-field);
  }

  html[data-theme="light"] body[data-page="unit-5-lessons"] .hero-card,
  html[data-theme="light"] body[data-page="unit-5-lessons"] #page-sections .section-block,
  html[data-theme="light"] body[data-page="unit-5-lessons"] .unit-layout-board {
    border-color: rgba(184, 139, 74, 0.18);
    box-shadow: 0 12px 28px rgba(145, 120, 87, 0.08), 0 0 0 1px rgba(184, 139, 74, 0.04) inset;
  }

  html[data-theme="light"] body[data-page="unit-5-lessons"] .hero-card {
    background:
      radial-gradient(circle at 14% 16%, rgba(145, 83, 117, 0.07), transparent 20%),
      radial-gradient(circle at 86% 82%, rgba(90, 143, 142, 0.07), transparent 20%),
      linear-gradient(180deg, rgba(255, 248, 241, 0.28), rgba(255, 255, 255, 0) 42%),
      var(--panel);
  }

  html[data-theme="light"] body[data-page="unit-5-lessons"] .unit-layout-board,
  html[data-theme="light"] body[data-page="unit-5-lessons"] #page-sections .section-block {
    background:
      linear-gradient(180deg, rgba(255, 250, 245, 0.32), rgba(255, 255, 255, 0) 44%),
      var(--panel);
  }

  html[data-theme="light"] body[data-page="unit-5-lessons"] .unit-layout-card,
  html[data-theme="light"] body[data-page="unit-5-lessons"] #page-sections .section-copy p {
    border-color: rgba(184, 139, 74, 0.16);
    background:
      linear-gradient(135deg, rgba(145, 83, 117, 0.06), rgba(90, 143, 142, 0.06) 58%, rgba(255, 255, 255, 0.3) 100%),
      var(--surface-field);
    box-shadow: 0 8px 18px rgba(145, 120, 87, 0.05);
  }

  html[data-theme="light"] body[data-page="unit-5-lessons"] #page-sections .section-block:nth-child(n+2):nth-child(-n+6)::before {
    border-color: rgba(184, 139, 74, 0.18);
    background: rgba(249, 243, 236, 0.94);
    box-shadow: 0 4px 12px rgba(145, 120, 87, 0.05);
  }

  html[data-theme="light"] body[data-page="unit-5-lessons"] .unit-layout-card-label {
    color: rgba(96, 77, 58, 0.78);
  }

  html[data-theme="light"] body[data-page="unit-5-lessons"] .unit-layout-table {
    background: rgba(252, 248, 242, 0.75);
    border-color: rgba(184, 139, 74, 0.16);
  }

  html[data-theme="light"] body[data-page="unit-5-lessons"] .unit-layout-table th,
  html[data-theme="light"] body[data-page="unit-5-lessons"] .unit-layout-table td {
    border-color: rgba(184, 139, 74, 0.14);
  }

  html[data-theme="light"] body[data-page="unit-5-lessons"] .unit-layout-table thead th {
    background: rgba(255, 248, 241, 0.32);
    color: var(--text);
  }

  @media (max-width: 920px) {
    body[data-page="unit-5-lessons"] .unit-layout-grid,
    body[data-page="unit-5-lessons"] .unit-layout-cards {
      grid-template-columns: 1fr;
    }

    body[data-page="unit-5-lessons"] #page-sections .section-block {
      width: 100%;
      max-width: none;
    }
  }
</style>
{{ super() }}
<section class="section-card unit-layout-board" aria-labelledby="unit-lessons-board-title">
  <div class="section-block-inner unit-layout-grid">
    <div class="unit-layout-cards">
      <article class="unit-layout-card">
        <span class="unit-layout-card-label" data-unit-card-label="0"></span>
        <strong class="unit-layout-card-value" data-unit-card-value="0"></strong>
      </article>
      <article class="unit-layout-card">
        <span class="unit-layout-card-label" data-unit-card-label="1"></span>
        <strong class="unit-layout-card-value" data-unit-card-value="1"></strong>
      </article>
      <article class="unit-layout-card">
        <span class="unit-layout-card-label" data-unit-card-label="2"></span>
        <strong class="unit-layout-card-value" data-unit-card-value="2"></strong>
      </article>
    </div>
    <div class="unit-layout-table-shell">
      <div class="section-headline">
        <h2 id="unit-lessons-board-title" data-unit-table-title></h2>
      </div>
      <table class="home-training-table unit-layout-table">
        <thead>
          <tr>
            <th scope="col" data-unit-table-head="0"></th>
            <th scope="col" data-unit-table-head="1"></th>
            <th scope="col" data-unit-table-head="2"></th>
          </tr>
        </thead>
        <tbody data-unit-table-body></tbody>
      </table>
    </div>
  </div>
</section>
<script>
  (() => {
    const config = {
      en: {
        cardLabels: ["Sections", "Points", "Reading Mode"],
        tableTitle: "Planning Workflow",
        tableHeadings: ["Section", "Purpose", "Density"],
        focus: "Workflow",
        roles: ["Overview", "Planning", "Activities", "Strategies", "Assessment", "Differentiation", "Appendices"],
        density: { brief: "Brief", focused: "Focused", detailed: "Detailed" },
        fallback: "Step"
      },
      ar: {
        cardLabels: ["الأقسام", "النقاط", "نمط القراءة"],
        tableTitle: "مسار التخطيط",
        tableHeadings: ["القسم", "الغرض", "الكثافة"],
        focus: "إجرائي",
        roles: ["مدخل", "تخطيط", "أنشطة", "استراتيجيات", "تقويم", "تفريد", "ملاحق"],
        density: { brief: "موجز", focused: "مركز", detailed: "تفصيلي" },
        fallback: "خطوة"
      }
    };

    const esc = (value) => String(value || "").replace(/[&<>"']/g, (char) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[char]));
    const densityLabel = (count, pack) => (count > 2 ? pack.density.detailed : count > 1 ? pack.density.focused : pack.density.brief);

    function updateBoard() {
      const blocks = [...document.querySelectorAll("#page-sections .section-block")];
      if (!blocks.length) return;
      const pack = config[document.documentElement.lang === "ar" ? "ar" : "en"];
      const pointCount = blocks.reduce((total, block) => total + block.querySelectorAll(".section-copy p").length, 0);

      document.querySelectorAll("[data-unit-card-label]").forEach((node, index) => {
        node.textContent = pack.cardLabels[index] || "";
      });

      [String(blocks.length), String(pointCount), pack.focus].forEach((value, index) => {
        const target = document.querySelector(`[data-unit-card-value="${index}"]`);
        if (target) target.textContent = value;
      });

      const tableTitle = document.querySelector("[data-unit-table-title]");
      if (tableTitle) tableTitle.textContent = pack.tableTitle;

      document.querySelectorAll("[data-unit-table-head]").forEach((node, index) => {
        node.textContent = pack.tableHeadings[index] || "";
      });

      const tableBody = document.querySelector("[data-unit-table-body]");
      if (!tableBody) return;

      tableBody.innerHTML = blocks.map((block, index) => {
        const title = block.querySelector(".section-headline h2")?.textContent.trim() || `${pack.fallback} ${index + 1}`;
        const density = densityLabel(block.querySelectorAll(".section-copy p").length, pack);
        return `<tr><th scope="row">${esc(title)}</th><td>${esc(pack.roles[index] || pack.fallback)}</td><td>${esc(density)}</td></tr>`;
      }).join("");
    }

    function initBoard() {
      updateBoard();
      const target = document.getElementById("page-sections");
      if (!target) return;
      const observer = new MutationObserver(() => requestAnimationFrame(updateBoard));
      observer.observe(target, { childList: true, subtree: true });
    }

    if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", initBoard, { once: true });
    else initBoard();
  })();
</script>
{% endblock %}
