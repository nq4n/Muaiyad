{% extends "base.html" %}

{% block hero %}
<style>
  body[data-page="unit-10-appendices"] .hero-card {
    border-color: var(--accent);
    background:
      radial-gradient(circle at 84% 18%, rgba(214, 177, 109, 0.12), transparent 24%),
      linear-gradient(135deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0) 40%),
      var(--panel);
  }

  body[data-page="unit-10-appendices"] .page-content {
    padding: 0;
    background: transparent;
    border: 0;
    box-shadow: none;
  }

  body[data-page="unit-10-appendices"] #page-sections {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    align-items: start;
    gap: 1rem;
  }

  body[data-page="unit-10-appendices"] #page-sections .section-block {
    width: 100%;
    max-width: none;
    min-height: 0;
    align-self: start;
    margin: 0 !important;
    padding: 1.45rem;
    border: 1px solid var(--border);
    border-radius: 1.15rem;
    background:
      linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0) 42%),
      var(--panel);
    box-shadow: var(--lift-shadow);
    transform: translateY(16px);
  }

  body[data-page="unit-10-appendices"] #page-sections .section-block:nth-child(odd),
  body[data-page="unit-10-appendices"] #page-sections .section-block:nth-child(even) {
    transform: translateY(16px);
  }

  body[data-page="unit-10-appendices"] #page-sections .section-block.is-visible {
    transform: none;
  }

  body[data-page="unit-10-appendices"] #page-sections .section-block:first-child {
    grid-column: 1 / -1;
  }

  body[data-page="unit-10-appendices"] #page-sections .section-block:nth-child(2)::before,
  body[data-page="unit-10-appendices"] #page-sections .section-block:nth-child(3)::before {
    content: "";
    display: block;
    width: 3.2rem;
    height: 2.2rem;
    margin-bottom: 1rem;
    border: 1px solid var(--border);
    border-radius: 0.7rem 0.7rem 0.35rem 0.35rem;
    background:
      linear-gradient(180deg, rgba(214, 177, 109, 0.14), rgba(214, 177, 109, 0) 100%),
      var(--surface-field);
  }

  body[data-page="unit-10-appendices"] .unit-layout-board {
    margin-top: 1rem;
    padding: 1.2rem;
  }

  body[data-page="unit-10-appendices"] .unit-layout-grid {
    display: grid;
    grid-template-columns: minmax(0, 0.92fr) minmax(0, 1.28fr);
    gap: 1rem;
    align-items: start;
  }

  body[data-page="unit-10-appendices"] .unit-layout-cards {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 0.75rem;
  }

  body[data-page="unit-10-appendices"] .unit-layout-card {
    display: grid;
    gap: 0.35rem;
    min-height: 6.5rem;
    padding: 1rem;
    border: 1px solid var(--border);
    border-radius: 1rem;
    background:
      linear-gradient(135deg, var(--accent-3-soft), var(--accent-2-soft) 58%, rgba(255, 255, 255, 0.03) 100%),
      var(--surface-field);
  }

  body[data-page="unit-10-appendices"] .unit-layout-card-label {
    color: var(--muted);
    font-size: 0.78rem;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  body[data-page="unit-10-appendices"] .unit-layout-card-value {
    color: var(--text);
    font-size: clamp(1.05rem, 1.3vw, 1.35rem);
    line-height: 1.3;
  }

  body[data-page="unit-10-appendices"] .unit-layout-table-shell {
    display: grid;
    gap: 0.8rem;
  }

  body[data-page="unit-10-appendices"] .unit-layout-table-shell .section-headline h2 {
    margin-bottom: 0;
    font-size: clamp(1.1rem, 1.6vw, 1.45rem);
  }

  body[data-page="unit-10-appendices"] .unit-layout-table th,
  body[data-page="unit-10-appendices"] .unit-layout-table td {
    padding: 0.85rem 0.95rem;
  }

  body[data-page="unit-10-appendices"] .unit-layout-table tbody th {
    width: 42%;
  }

  body[data-page="unit-10-appendices"] #page-sections .section-copy {
    display: grid;
    gap: 0.7rem;
  }

  body[data-page="unit-10-appendices"] #page-sections .section-copy p {
    margin: 0;
    padding: 0.88rem 1rem;
    border: 1px solid rgba(214, 177, 109, 0.14);
    border-radius: 0.95rem;
    background:
      linear-gradient(135deg, var(--accent-3-soft), var(--accent-2-soft) 58%, rgba(255, 255, 255, 0.03) 100%),
      var(--surface-field);
  }

  body[data-page="unit-10-appendices"] #page-sections .section-html .section-copy p {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 0.65rem 0.55rem;
    overflow-wrap: anywhere;
  }

  body[data-page="unit-10-appendices"] #page-sections .section-html .section-copy strong {
    flex: 1 0 100%;
    color: var(--text);
    line-height: 1.65;
  }

  body[data-page="unit-10-appendices"] #page-sections .section-html .section-copy br {
    display: none;
  }

  body[data-page="unit-10-appendices"] #page-sections .section-html .appendix-link {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 0.65rem;
    min-height: 2.85rem;
    max-width: 100%;
    padding: 0.55rem 0.9rem;
    border: 1px solid rgba(214, 177, 109, 0.28);
    border-radius: 0.85rem;
    background:
      linear-gradient(135deg, rgba(214, 177, 109, 0.16), rgba(90, 143, 142, 0.1) 52%, rgba(145, 83, 117, 0.1)),
      rgba(18, 27, 30, 0.82);
    box-shadow: 0 10px 20px rgba(0, 0, 0, 0.16), 0 0 0 1px rgba(214, 177, 109, 0.04) inset;
    color: var(--text);
    font-weight: 700;
    white-space: normal;
    overflow-wrap: anywhere;
    line-height: 1.55;
    text-align: center;
    text-decoration: none;
    transition:
      transform 0.2s ease,
      border-color 0.2s ease,
      background-color 0.2s ease,
      box-shadow 0.2s ease;
  }

  body[data-page="unit-10-appendices"] #page-sections .section-html .appendix-link:hover,
  body[data-page="unit-10-appendices"] #page-sections .section-html .appendix-link:focus-visible {
    transform: translateY(-2px);
    border-color: var(--accent);
    background:
      linear-gradient(135deg, rgba(214, 177, 109, 0.22), rgba(90, 143, 142, 0.13) 52%, rgba(145, 83, 117, 0.13)),
      rgba(22, 32, 36, 0.95);
    box-shadow: 0 14px 26px rgba(0, 0, 0, 0.22), 0 0 0 1px rgba(214, 177, 109, 0.08) inset;
    text-decoration: none;
  }

  body[data-page="unit-10-appendices"] #page-sections .appendix-link-icon {
    display: inline-grid;
    place-items: center;
    flex: 0 0 auto;
    min-width: 1.75rem;
    height: 1.75rem;
    padding-inline: 0.42rem;
    border: 1px solid rgba(214, 177, 109, 0.24);
    border-radius: 0.55rem;
    background: rgba(0, 0, 0, 0.18);
    color: var(--accent);
    font-size: 0.72rem;
    font-weight: 800;
    line-height: 1;
    box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.03) inset;
  }

  body[data-page="unit-10-appendices"] #page-sections .appendix-link--drive .appendix-link-icon {
    border-color: rgba(90, 143, 142, 0.38);
    background: linear-gradient(135deg, rgba(90, 143, 142, 0.2), rgba(214, 177, 109, 0.1));
    color: #bfe7d7;
  }

  body[data-page="unit-10-appendices"] #page-sections .appendix-link--powerpoint .appendix-link-icon {
    border-color: rgba(214, 177, 109, 0.38);
    background: linear-gradient(135deg, rgba(214, 177, 109, 0.22), rgba(145, 83, 117, 0.12));
    color: #f7dfae;
  }

  body[data-page="unit-10-appendices"] #page-sections .appendix-link--attachment .appendix-link-icon {
    border-color: rgba(145, 83, 117, 0.38);
    background: linear-gradient(135deg, rgba(145, 83, 117, 0.22), rgba(90, 143, 142, 0.1));
    color: #f0bfd4;
    font-size: 0.92rem;
  }

  html[data-theme="light"] body[data-page="unit-10-appendices"] #page-sections .section-html .appendix-link {
    border-color: rgba(184, 139, 74, 0.24);
    background:
      linear-gradient(135deg, rgba(184, 139, 74, 0.16), rgba(95, 143, 134, 0.1) 52%, rgba(143, 98, 119, 0.1)),
      rgba(249, 243, 236, 0.92);
    box-shadow: 0 10px 20px rgba(145, 120, 87, 0.08), 0 0 0 1px rgba(184, 139, 74, 0.05) inset;
  }

  html[data-theme="light"] body[data-page="unit-10-appendices"] #page-sections .section-html .appendix-link:hover,
  html[data-theme="light"] body[data-page="unit-10-appendices"] #page-sections .section-html .appendix-link:focus-visible {
    border-color: var(--accent);
    background:
      linear-gradient(135deg, rgba(184, 139, 74, 0.2), rgba(95, 143, 134, 0.13) 52%, rgba(143, 98, 119, 0.13)),
      rgba(250, 244, 237, 0.98);
    box-shadow: 0 14px 24px rgba(145, 120, 87, 0.12), 0 0 0 1px rgba(184, 139, 74, 0.08) inset;
  }

  html[data-theme="light"] body[data-page="unit-10-appendices"] #page-sections .appendix-link-icon {
    border-color: rgba(184, 139, 74, 0.22);
    background: rgba(184, 139, 74, 0.08);
  }

  html[data-theme="light"] body[data-page="unit-10-appendices"] #page-sections .appendix-link--drive .appendix-link-icon {
    border-color: rgba(95, 143, 134, 0.28);
    background: linear-gradient(135deg, rgba(95, 143, 134, 0.16), rgba(184, 139, 74, 0.08));
    color: #315f58;
  }

  html[data-theme="light"] body[data-page="unit-10-appendices"] #page-sections .appendix-link--powerpoint .appendix-link-icon {
    border-color: rgba(184, 139, 74, 0.28);
    background: linear-gradient(135deg, rgba(184, 139, 74, 0.18), rgba(143, 98, 119, 0.08));
    color: #6b4b1f;
  }

  html[data-theme="light"] body[data-page="unit-10-appendices"] #page-sections .appendix-link--attachment .appendix-link-icon {
    border-color: rgba(143, 98, 119, 0.28);
    background: linear-gradient(135deg, rgba(143, 98, 119, 0.16), rgba(95, 143, 134, 0.08));
    color: #6a3650;
  }

  html[data-theme="light"] body[data-page="unit-10-appendices"] .hero-card,
  html[data-theme="light"] body[data-page="unit-10-appendices"] #page-sections .section-block,
  html[data-theme="light"] body[data-page="unit-10-appendices"] .unit-layout-board {
    border-color: rgba(184, 139, 74, 0.18);
    box-shadow: 0 12px 28px rgba(145, 120, 87, 0.08), 0 0 0 1px rgba(184, 139, 74, 0.04) inset;
  }

  html[data-theme="light"] body[data-page="unit-10-appendices"] .hero-card {
    background:
      radial-gradient(circle at 14% 16%, rgba(145, 83, 117, 0.07), transparent 20%),
      radial-gradient(circle at 86% 82%, rgba(90, 143, 142, 0.07), transparent 20%),
      linear-gradient(180deg, rgba(255, 248, 241, 0.28), rgba(255, 255, 255, 0) 42%),
      var(--panel);
  }

  html[data-theme="light"] body[data-page="unit-10-appendices"] .unit-layout-board,
  html[data-theme="light"] body[data-page="unit-10-appendices"] #page-sections .section-block {
    background:
      linear-gradient(180deg, rgba(255, 250, 245, 0.32), rgba(255, 255, 255, 0) 44%),
      var(--panel);
  }

  html[data-theme="light"] body[data-page="unit-10-appendices"] #page-sections .section-block:nth-child(2)::before,
  html[data-theme="light"] body[data-page="unit-10-appendices"] #page-sections .section-block:nth-child(3)::before {
    border-color: rgba(184, 139, 74, 0.18);
    background:
      linear-gradient(180deg, rgba(184, 139, 74, 0.1), rgba(255, 255, 255, 0) 100%),
      var(--surface-field);
  }

  html[data-theme="light"] body[data-page="unit-10-appendices"] .unit-layout-card,
  html[data-theme="light"] body[data-page="unit-10-appendices"] #page-sections .section-copy p {
    border-color: rgba(184, 139, 74, 0.16);
    background:
      linear-gradient(135deg, rgba(145, 83, 117, 0.06), rgba(90, 143, 142, 0.06) 58%, rgba(255, 255, 255, 0.3) 100%),
      var(--surface-field);
    box-shadow: 0 8px 18px rgba(145, 120, 87, 0.05);
  }

  html[data-theme="light"] body[data-page="unit-10-appendices"] .unit-layout-card-label {
    color: rgba(96, 77, 58, 0.78);
  }

  html[data-theme="light"] body[data-page="unit-10-appendices"] .unit-layout-table {
    background: rgba(252, 248, 242, 0.75);
    border-color: rgba(184, 139, 74, 0.16);
  }

  html[data-theme="light"] body[data-page="unit-10-appendices"] .unit-layout-table th,
  html[data-theme="light"] body[data-page="unit-10-appendices"] .unit-layout-table td {
    border-color: rgba(184, 139, 74, 0.14);
  }

  html[data-theme="light"] body[data-page="unit-10-appendices"] .unit-layout-table thead th {
    background: rgba(255, 248, 241, 0.32);
    color: var(--text);
  }

  @media (max-width: 920px) {
    body[data-page="unit-10-appendices"] #page-sections,
    body[data-page="unit-10-appendices"] .unit-layout-grid,
    body[data-page="unit-10-appendices"] .unit-layout-cards {
      grid-template-columns: 1fr;
    }
  }
</style>
{{ super() }}
<section class="section-card unit-layout-board" aria-labelledby="unit-appendices-board-title">
  <div class="section-block-inner unit-sections-map" data-unit-sections-map>
    <div class="section-headline">
      <h2 id="unit-appendices-board-title">{{ "الخريطة الذهنية للأقسام" if lang == "ar" else "Section Mind Map" }}</h2>
    </div>
    <ul class="unit-sections-map-list" data-unit-map-list></ul>
  </div>
</section>
{% endblock %}
