{% extends "base.html" %}
{% set static_render = true %}
{% set hide_default_hero = true %}

{% block page_content %}
<div class="content-container graduation-project-shell">
  <section class="section-card graduation-project-hero reveal" data-reveal="fade-up">
    <div class="section-block-inner graduation-project-hero-grid">
      <div class="graduation-project-hero-copy">
        <p class="graduation-project-kicker" id="graduation-project-kicker"></p>

        <div class="graduation-project-title-row">
          <div class="graduation-project-logo-frame">
            <img id="graduation-project-logo" class="graduation-project-logo" src="" alt="">
          </div>

          <div class="graduation-project-title-block">
            <h1 id="graduation-project-title"></h1>
            <div class="section-copy graduation-project-subtitle" id="graduation-project-subtitle"></div>
          </div>
        </div>

        <nav class="graduation-project-actions" id="graduation-project-actions"></nav>
      </div>

      <aside class="graduation-project-summary">
        <p class="graduation-project-panel-label" id="graduation-project-panel-label"></p>
        <h2 id="graduation-project-panel-title"></h2>
        <div class="section-copy graduation-project-panel-copy" id="graduation-project-panel-copy"></div>
        <div class="graduation-project-stats" id="graduation-project-stats"></div>
      </aside>
    </div>
  </section>

  <div class="graduation-project-main">
    <section class="section-card graduation-project-section reveal" data-reveal="fade-up">
      <div class="section-block-inner">
        <header class="graduation-project-section-head">
          <div class="section-headline">
            <h2 id="graduation-project-platform-title"></h2>
          </div>
        </header>
        <div class="section-copy" id="graduation-project-platform-copy"></div>
      </div>
    </section>

    <section class="section-card graduation-project-section reveal" data-reveal="fade-up">
      <div class="section-block-inner">
        <header class="graduation-project-section-head">
          <div class="section-headline">
            <h2 id="graduation-project-purpose-title"></h2>
          </div>
        </header>
        <div class="section-copy" id="graduation-project-purpose-copy"></div>
      </div>
    </section>

    <section class="section-card graduation-project-section graduation-project-offers reveal" data-reveal="fade-up">
      <div class="section-block-inner">
        <header class="graduation-project-section-head">
          <div class="section-headline">
            <h2 id="graduation-project-offers-title"></h2>
          </div>
          <div class="section-copy graduation-project-offers-intro" id="graduation-project-offers-intro"></div>
        </header>
        <div class="graduation-project-offer-grid" id="graduation-project-offer-grid"></div>
      </div>
    </section>

    <section class="section-card graduation-project-section reveal" data-reveal="fade-up">
      <div class="section-block-inner">
        <header class="graduation-project-section-head">
          <div class="section-headline">
            <h2 id="graduation-project-reflection-title"></h2>
          </div>
        </header>
        <div class="section-copy" id="graduation-project-reflection-copy"></div>
        <ul class="graduation-project-reflection-points" id="graduation-project-reflection-points"></ul>
      </div>
    </section>

    <section class="section-card graduation-project-section graduation-project-links reveal" data-reveal="fade-up">
      <div class="section-block-inner">
        <header class="graduation-project-section-head">
          <div class="section-headline">
            <h2 id="graduation-project-links-title"></h2>
          </div>
        </header>
        <div class="section-copy" id="graduation-project-links-copy"></div>
        <div class="graduation-project-link-grid" id="graduation-project-link-grid"></div>
      </div>
    </section>
  </div>
</div>

<style>
  body[data-page="graduation-project"] .hero-card,
  body[data-page="graduation-project"] .page-content {
    background: transparent;
    border: 0;
    box-shadow: none;
  }

  body[data-page="graduation-project"] .page-content {
    padding: 0;
  }

  body[data-page="graduation-project"] .content-container {
    max-width: none;
    margin: 0;
    padding: 0;
  }

  body[data-page="graduation-project"] .graduation-project-shell {
    --gp-blue: #2c5d76;
    --gp-blue-soft: rgba(44, 93, 118, 0.16);
    --gp-gold: #bf8332;
    --gp-gold-soft: rgba(191, 131, 50, 0.18);
    --gp-card: rgba(10, 16, 18, 0.66);
    --gp-card-edge: rgba(191, 131, 50, 0.22);
    display: grid;
    gap: 1.6rem;
  }

  body[data-page="graduation-project"] .graduation-project-hero {
    overflow: hidden;
    border: 1px solid var(--gp-card-edge);
    background:
      radial-gradient(circle at top left, rgba(191, 131, 50, 0.18), transparent 36%),
      radial-gradient(circle at bottom right, rgba(44, 93, 118, 0.24), transparent 42%),
      linear-gradient(135deg, rgba(255, 255, 255, 0.02), transparent 52%),
      var(--gp-card);
    box-shadow: 0 28px 48px rgba(0, 0, 0, 0.16);
  }

  body[data-page="graduation-project"] .graduation-project-hero-grid {
    display: grid;
    grid-template-columns: minmax(0, 1.35fr) minmax(300px, 0.85fr);
    gap: 1.5rem;
    align-items: stretch;
  }

  body[data-page="graduation-project"] .graduation-project-hero-copy,
  body[data-page="graduation-project"] .graduation-project-summary,
  body[data-page="graduation-project"] .graduation-project-section {
    position: relative;
  }

  body[data-page="graduation-project"] .graduation-project-kicker,
  body[data-page="graduation-project"] .graduation-project-panel-label {
    margin: 0 0 0.85rem;
    color: var(--gp-gold);
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  body[data-page="graduation-project"] .graduation-project-title-row {
    display: grid;
    grid-template-columns: 108px minmax(0, 1fr);
    gap: 1.15rem;
    align-items: center;
  }

  body[data-page="graduation-project"] .graduation-project-logo-frame {
    display: grid;
    place-items: center;
    min-height: 108px;
    padding: 0.8rem;
    border-radius: 1.3rem;
    border: 1px solid rgba(191, 131, 50, 0.22);
    background:
      linear-gradient(180deg, rgba(191, 131, 50, 0.12), rgba(44, 93, 118, 0.1)),
      rgba(255, 255, 255, 0.03);
  }

  body[data-page="graduation-project"] .graduation-project-logo {
    width: 100%;
    max-width: 72px;
    height: auto;
    display: block;
    object-fit: contain;
  }

  body[data-page="graduation-project"] .graduation-project-title-block h1,
  body[data-page="graduation-project"] .graduation-project-summary h2 {
    margin: 0;
  }

  body[data-page="graduation-project"] .graduation-project-title-block h1 {
    font-size: clamp(2rem, 4vw, 3.3rem);
    line-height: 0.98;
    max-width: 12ch;
    text-wrap: balance;
  }

  body[data-page="graduation-project"] .graduation-project-subtitle,
  body[data-page="graduation-project"] .graduation-project-panel-copy {
    margin-top: 0.95rem;
  }

  body[data-page="graduation-project"] .graduation-project-actions,
  body[data-page="graduation-project"] .graduation-project-link-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 0.8rem;
    align-items: stretch;
  }

  body[data-page="graduation-project"] .graduation-project-actions {
    margin-top: 1.5rem;
  }

  body[data-page="graduation-project"] .graduation-project-button,
  body[data-page="graduation-project"] .graduation-project-link-card {
    border-radius: 999px;
    text-decoration: none;
    transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
  }

  body[data-page="graduation-project"] .graduation-project-button {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 2.95rem;
    padding: 0.8rem 1.2rem;
    border: 1px solid rgba(191, 131, 50, 0.26);
    background:
      linear-gradient(180deg, rgba(191, 131, 50, 0.14), rgba(255, 255, 255, 0) 100%),
      rgba(14, 21, 24, 0.74);
    color: var(--text);
    font-weight: 700;
  }

  body[data-page="graduation-project"] .graduation-project-button--primary {
    border-color: rgba(191, 131, 50, 0.42);
    box-shadow: 0 16px 28px rgba(191, 131, 50, 0.12);
  }

  body[data-page="graduation-project"] .graduation-project-button--secondary {
    border-color: rgba(44, 93, 118, 0.34);
    background:
      linear-gradient(180deg, rgba(44, 93, 118, 0.18), rgba(255, 255, 255, 0) 100%),
      rgba(14, 21, 24, 0.74);
  }

  body[data-page="graduation-project"] .graduation-project-button--document {
    border-style: dashed;
  }

  body[data-page="graduation-project"] .graduation-project-button:hover,
  body[data-page="graduation-project"] .graduation-project-button:focus-visible,
  body[data-page="graduation-project"] .graduation-project-link-card:hover,
  body[data-page="graduation-project"] .graduation-project-link-card:focus-visible {
    transform: translateY(-1px);
    box-shadow: 0 18px 30px rgba(0, 0, 0, 0.16);
  }

  body[data-page="graduation-project"] .graduation-project-button.is-disabled,
  body[data-page="graduation-project"] .graduation-project-link-card.is-disabled {
    cursor: default;
    opacity: 0.72;
    box-shadow: none;
  }

  body[data-page="graduation-project"] .graduation-project-button.is-disabled:hover,
  body[data-page="graduation-project"] .graduation-project-button.is-disabled:focus-visible,
  body[data-page="graduation-project"] .graduation-project-link-card.is-disabled:hover,
  body[data-page="graduation-project"] .graduation-project-link-card.is-disabled:focus-visible {
    transform: none;
    box-shadow: none;
  }

  body[data-page="graduation-project"] .graduation-project-summary,
  body[data-page="graduation-project"] .graduation-project-section {
    border: 1px solid var(--gp-card-edge);
    border-radius: 1.4rem;
    background:
      linear-gradient(180deg, rgba(191, 131, 50, 0.08), rgba(255, 255, 255, 0) 100%),
      rgba(11, 17, 19, 0.54);
  }

  body[data-page="graduation-project"] .graduation-project-summary {
    padding: 1.6rem;
  }

  body[data-page="graduation-project"] .graduation-project-stats {
    display: grid;
    gap: 0.9rem;
    margin-top: 1.35rem;
  }

  body[data-page="graduation-project"] .graduation-project-stat {
    display: grid;
    gap: 0.2rem;
    padding: 0.9rem 1rem;
    border-radius: 1rem;
    border: 1px solid rgba(44, 93, 118, 0.24);
    background: rgba(255, 255, 255, 0.03);
  }

  body[data-page="graduation-project"] .graduation-project-stat-label {
    font-size: 0.74rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  body[data-page="graduation-project"] .graduation-project-stat-value {
    color: var(--text);
    font-weight: 700;
    line-height: 1.45;
  }

  body[data-page="graduation-project"] .graduation-project-main {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 1.4rem;
  }

  body[data-page="graduation-project"] .graduation-project-offers {
    grid-column: 1 / -1;
  }

  body[data-page="graduation-project"] .graduation-project-section-head {
    margin-bottom: 1rem;
  }

  body[data-page="graduation-project"] .graduation-project-offers-intro {
    margin-top: 0.75rem;
  }

  body[data-page="graduation-project"] .graduation-project-offer-grid,
  body[data-page="graduation-project"] .graduation-project-link-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
    gap: 1rem;
  }

  body[data-page="graduation-project"] .graduation-project-offer-card,
  body[data-page="graduation-project"] .graduation-project-link-card {
    display: grid;
    gap: 0.7rem;
    padding: 1.15rem;
    border: 1px solid rgba(44, 93, 118, 0.22);
    border-radius: 1.1rem;
    background:
      linear-gradient(180deg, rgba(44, 93, 118, 0.12), rgba(255, 255, 255, 0) 100%),
      rgba(255, 255, 255, 0.03);
  }

  body[data-page="graduation-project"] .graduation-project-offer-card h3,
  body[data-page="graduation-project"] .graduation-project-link-card-title {
    margin: 0;
  }

  body[data-page="graduation-project"] .graduation-project-link-card {
    align-content: start;
    min-height: 100%;
    border-color: rgba(191, 131, 50, 0.22);
    color: var(--text);
  }

  body[data-page="graduation-project"] .graduation-project-link-kind {
    font-size: 0.74rem;
    color: var(--gp-gold);
    text-transform: uppercase;
    letter-spacing: 0.11em;
    font-weight: 700;
  }

  body[data-page="graduation-project"] .graduation-project-link-note {
    color: var(--muted);
    line-height: 1.75;
  }

  body[data-page="graduation-project"] .graduation-project-link-status {
    margin-top: auto;
    color: var(--gp-blue);
    font-weight: 700;
  }

  body[data-page="graduation-project"] .graduation-project-reflection-points {
    margin: 1rem 0 0;
    padding: 0;
    list-style: none;
    display: grid;
    gap: 0.75rem;
  }

  body[data-page="graduation-project"] .graduation-project-reflection-points li {
    padding: 0.85rem 1rem;
    border-radius: 1rem;
    border-inline-start: 3px solid var(--gp-gold);
    background: rgba(191, 131, 50, 0.08);
    line-height: 1.7;
  }

  html[data-theme="light"] body[data-page="graduation-project"] .graduation-project-shell {
    --gp-card: rgba(250, 244, 236, 0.88);
    --gp-card-edge: rgba(191, 131, 50, 0.18);
  }

  html[data-theme="light"] body[data-page="graduation-project"] .graduation-project-hero,
  html[data-theme="light"] body[data-page="graduation-project"] .graduation-project-summary,
  html[data-theme="light"] body[data-page="graduation-project"] .graduation-project-section {
    box-shadow: 0 16px 34px rgba(145, 120, 87, 0.08);
  }

  html[data-theme="light"] body[data-page="graduation-project"] .graduation-project-hero {
    background:
      radial-gradient(circle at top left, rgba(191, 131, 50, 0.16), transparent 34%),
      radial-gradient(circle at bottom right, rgba(44, 93, 118, 0.16), transparent 42%),
      linear-gradient(180deg, rgba(255, 248, 241, 0.7), rgba(255, 255, 255, 0) 100%),
      rgba(249, 243, 236, 0.9);
  }

  html[data-theme="light"] body[data-page="graduation-project"] .graduation-project-summary,
  html[data-theme="light"] body[data-page="graduation-project"] .graduation-project-section,
  html[data-theme="light"] body[data-page="graduation-project"] .graduation-project-offer-card,
  html[data-theme="light"] body[data-page="graduation-project"] .graduation-project-link-card,
  html[data-theme="light"] body[data-page="graduation-project"] .graduation-project-stat {
    background:
      linear-gradient(180deg, rgba(255, 249, 242, 0.6), rgba(255, 255, 255, 0) 100%),
      rgba(250, 244, 237, 0.92);
  }

  html[data-theme="light"] body[data-page="graduation-project"] .graduation-project-button {
    background:
      linear-gradient(180deg, rgba(255, 248, 241, 0.55), rgba(255, 255, 255, 0) 100%),
      rgba(250, 244, 237, 0.96);
  }

  html[data-theme="light"] body[data-page="graduation-project"] .graduation-project-button--secondary {
    background:
      linear-gradient(180deg, rgba(44, 93, 118, 0.08), rgba(255, 255, 255, 0) 100%),
      rgba(250, 244, 237, 0.96);
  }

  @media (max-width: 980px) {
    body[data-page="graduation-project"] .graduation-project-hero-grid,
    body[data-page="graduation-project"] .graduation-project-main {
      grid-template-columns: 1fr;
    }

    body[data-page="graduation-project"] .graduation-project-title-block h1 {
      max-width: none;
    }
  }

  @media (max-width: 700px) {
    body[data-page="graduation-project"] .graduation-project-title-row {
      grid-template-columns: 1fr;
      justify-items: center;
      text-align: center;
    }

    body[data-page="graduation-project"] .graduation-project-actions {
      justify-content: center;
    }

    body[data-page="graduation-project"] .graduation-project-button {
      width: 100%;
    }

    body[data-page="graduation-project"] .graduation-project-logo-frame {
      width: min(140px, 100%);
    }
  }
</style>
{% endblock %}
